name: Next.js 16 CI (Lint, Auto-Repair, and Build)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

permissions:
  contents: write

jobs:
  ci-build:
    name: Lint, Repair, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Step 1: Run Prettier and ESLint autofixes directly
      - name: Run Auto-Repair (Format & Lint Fix)
        run: |
          npx prettier --write "src/**/*.{js,jsx,ts,tsx,json,css,scss,md}" || true
          npx eslint --fix . || true

      # Step 2: Push repaired changes back to your repository
      - name: Commit & Push Repaired Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(ci): auto-repair lint and formatting issues"
          file_pattern: 'src/**/*.js src/**/*.jsx src/**/*.ts src/**/*.tsx src/**/*.json src/**/*.css src/**/*.scss'

      # Step 3: Run strict ESLint verification directly (replaces deprecated next lint)
      - name: Strict Lint Check
        run: npx eslint .

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js 16 Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
