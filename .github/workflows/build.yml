name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: SuperAI Auto-Repair Agent
        if: failure()
        run: |
          echo "⚠️ Build or tests failed! Initializing SuperAI repair agent..."
          echo "Analyzing stack traces and identifying compile/test errors..."
          sleep 2
          echo "Searching for automated patches..."
          sleep 2
          echo "Generating patch proposals..."
          # Mock repair step
          echo "Failed to auto-apply patch. Please review PR comments for suggested fixes."

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: app/build/outputs/

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: app/build/outputs/
          
      - name: Deploy to Staging Environment
        run: |
          echo "Deploying to staging environment..."
          # Mock deployment steps
          echo "Pushing artifacts to staging server..."
          sleep 2
          echo "Deployment successful!"
        env:
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
